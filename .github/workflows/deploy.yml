name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: |
          cat > /tmp/firebase-key.json << 'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VIBASA_5AC30 }}
          EOF
          npx firebase deploy --only hosting --project vibasa-5ac30
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json
