name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: |
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT_VIBASA_5AC30 }}" > "${{ runner.temp }}/firebase-key.json"
          npx firebase-tools@latest deploy --only hosting --project vibasa-5ac30 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: "${{ runner.temp }}/firebase-key.json"
